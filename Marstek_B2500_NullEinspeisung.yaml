blueprint:
  name: Marstek B2500 Nulleinspeisung
  description: >-
    Steuert den Marstek B2500 Speicher für eine möglichst genaue Nulleinspeisung.
    Der Ausgang wird anhand des Hausverbrauchs dynamisch angepasst.
    ### Version: 0.3 ###
  domain: automation
  input:

    sensoren:
      name: Sensoren
      icon: mdi:chart-line
      collapsed: false
      input:
        sensor_min:
          name: Hausverbrauch Sensor (Min 5min)
          description: Minimaler Hausverbrauch der letzten 5 Minuten
          selector:
            entity:
              domain: sensor
        sensor_avg:
          name: Hausverbrauch Sensor (Durchschnitt 5min)
          description: Durchschnittlicher Hausverbrauch der letzten 5 Minuten
          selector:
            entity:
              domain: sensor

    speicher:
      name: Speicher Entitäten
      icon: mdi:battery
      collapsed: false
      input:
        battery_percentage:
          name: Batterie Ladestand (%)
          description: Sensor für den aktuellen Ladestand
          selector:
            entity:
              domain: sensor
        battery_capacity:
          name: Batterie Kapazität
          description: Sensor für die verfügbare Kapazität
          selector:
            entity:
              domain: sensor
        output_value:
          name: Ausgangsleistung
          description: Einstellbare Ausgangsleistung des Speichers
          selector:
            entity:
              domain: number
        time_period_enabled:
          name: Zeitraum aktiviert
          description: Schalter für den aktiven Zeitraum
          selector:
            entity:
              domain: switch
        charging_mode:
          name: Lademodus
          description: Auswahl des Lademodus
          selector:
            entity:
              domain: select

    lademodi:
      name: Lademodi
      icon: mdi:lightning-bolt
      collapsed: true
      input:
        mode_lowbat:
          name: LowBat Lademodus
          description: Lademodus wenn der Akku leer ist
          default: "Fully Charge Then Discharge"
          selector:
            select:
              options:
                - "Fully Charge Then Discharge"
                - "Simultaneous Charging/Discharging"
        mode_normal:
          name: Normal Lademodus
          description: Lademodus im Normalbetrieb
          default: "Simultaneous Charging/Discharging"
          selector:
            select:
              options:
                - "Fully Charge Then Discharge"
                - "Simultaneous Charging/Discharging"

    schwellwerte:
      name: Schwellwerte & Grenzen
      icon: mdi:tune
      collapsed: true
      input:
        min_power:
          name: Minimale Ausgangsleistung (W)
          description: Untergrenze der Ausgangsleistung
          default: 50
          selector:
            number:
              min: 0
              max: 800
              unit_of_measurement: W
              mode: slider
        max_power:
          name: Maximale Ausgangsleistung (W)
          description: Obergrenze der Ausgangsleistung
          default: 800
          selector:
            number:
              min: 0
              max: 800
              unit_of_measurement: W
              mode: slider
        lowbat_threshold:
          name: LowBat Schwellwert (%)
          description: Ladestand ab dem LowBat Modus aktiv wird
          default: 10
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider

    erweitert:
      name: Erweiterte Einstellungen
      icon: mdi:cog
      collapsed: true
      input:
        update_interval:
          name: Update Intervall (Sekunden)
          description: Wie oft die Automation ausgeführt wird
          default: 30
          selector:
            number:
              min: 10
              max: 300
              unit_of_measurement: s
              mode: slider

variables:
  var_sensor_min: !input sensor_min
  var_sensor_avg: !input sensor_avg
  var_battery_percentage: !input battery_percentage
  var_output_value: !input output_value
  var_time_period_enabled: !input time_period_enabled
  var_charging_mode: !input charging_mode
  var_mode_lowbat: !input mode_lowbat
  var_mode_normal: !input mode_normal
  var_min_power: !input min_power
  var_max_power: !input max_power
  var_lowbat_threshold: !input lowbat_threshold
  var_gewichteter_wert: >-
    {{ ((states(var_sensor_min) | float(0) * 2)
    + (states(var_sensor_avg) | float(0))) / 3 }}

trigger:
  - platform: time_pattern
    seconds: !input update_interval

condition:
  - condition: template
    value_template: >-
      {{ states(var_battery_percentage) not in ['unavailable', 'unknown'] }}

action:
  - choose:

      # ─── LowBat Modus ───────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >-
              {{ states(var_battery_percentage) | float(0) <= var_lowbat_threshold }}
          - condition: template
            value_template: >-
              {{ states(var_charging_mode) != var_mode_lowbat }}
        sequence:
          - alias: LowBat Modus aktivieren
            action: select.select_option
            data:
              option: "{{ var_mode_lowbat }}"
            target:
              entity_id: !input charging_mode
          - alias: Minimale Leistung setzen
            action: number.set_value
            data:
              value: "{{ var_min_power }}"
            target:
              entity_id: !input output_value

      # ─── Normalbetrieb ──────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >-
              {{ states(var_battery_percentage) | float(0) > var_lowbat_threshold }}
        sequence:
          - alias: Normalen Lademodus sicherstellen
            if:
              - condition: template
                value_template: >-
                  {{ states(var_charging_mode) != var_mode_normal }}
            then:
              - action: select.select_option
                data:
                  option: "{{ var_mode_normal }}"
                target:
                  entity_id: !input charging_mode

          - alias: Zeitraum aktivieren falls nötig
            if:
              - condition: state
                entity_id: !input time_period_enabled
                state: "off"
            then:
              - action: switch.turn_on
                target:
                  entity_id: !input time_period_enabled

          - alias: Ausgangsleistung berechnen und setzen
            action: number.set_value
            data:
              value: >-
                {{ [[var_gewichteter_wert, var_min_power] | max, var_max_power] | min }}
            target:
              entity_id: !input output_value

mode: single
max_exceeded: silent
